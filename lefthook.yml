pre-commit:
  parallel: true
  commands:
    js:
      glob: "*.{js,mjs,ts,tsx,jsx}"
      run: bunx oxlint --fix {staged_files} && bunx oxfmt {staged_files}
      stage_fixed: true
    css:
      glob: "*.css"
      run: bunx stylelint --fix {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck
